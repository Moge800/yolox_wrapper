; YOLOX Wrapper 設定ファイル
; セクションを追加して環境ごとに切り替えられます。
; GUI の「設定プロファイル」コンボボックスで切り替えます。

[default]
; デバイス: cpu / cuda / cuda:0
device = cpu
; モデルサイズ: nano / tiny / s / m / l / x
model_size = l
; 学習バッチサイズ
batch_size = 16
; 入力画像サイズ (正方形)
imgsz = 640
; データローダーワーカー数
workers = 4
; 検証データ割合
val_split = 0.2
; デフォルト出力ディレクトリ (空欄 = data.yaml の output_dir を使用)
output_dir =
; 推論信頼度閾値
conf = 0.25
; NMS IOU 閾値
iou = 0.45

[factory_pc]
; 工場PC (RTX 5070Ti 16GB)
device = cuda:0
model_size = l
batch_size = 16
imgsz = 640
workers = 4
val_split = 0.2
output_dir =
conf = 0.25
iou = 0.45

[dev_pc]
; 開発機 (GPU なし)
device = cpu
model_size = s
batch_size = 4
imgsz = 416
workers = 2
val_split = 0.2
output_dir =
conf = 0.25
iou = 0.45
